<!DOCTYPE html>
<html lang="en">
<head>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Digital Library</title>
<style>
    body { 
        font-family: 'Poppins', sans-serif; 
        background-color: #f8f9fa; 
        margin: 0; padding: 20px; color: #333; 
    }
    h1 { text-align: center; color: #2c3e50; margin-bottom: 40px; }
    
    .library-container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 30px;
        max-width: 1200px;
        margin: auto;
    }
    
    .book-card {
        background: lightblue;
        border-radius: 15px;
        padding: 20px;
        text-align: center;
        box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    /* Hover effect: Jab mouse card par jayega toh wo upar uthega */
    .book-card:hover {
        transform: translateY(-10px);
        box-shadow: 0 15px 30px rgba(0,0,0,0.15);
    }

    .book-card h3 { margin: 10px 0; color: #2c3e50; }
    .book-card p { color: #7f8c8d; font-size: 0.9em; }

    .btn { 
        display: inline-block; 
        background: #3498db; 
        color: white; 
        padding: 10px 20px; 
        text-decoration: none; 
        border-radius: 25px; 
        margin-top: 15px;
        transition: background 0.3s;
    }
    .btn:hover { background: #2980b9; }
</style>


</head>
<body>

    <h1>Meri Library</h1>

    <div class="library-container">
        <!-- Book 1 -->
        <div class="book-card">
            <h3>Book Title 1</h3>
            <p>Author Name</p>
            <a href="#" class="btn">Read Now</a>
        </div>

        <!-- Book 2 -->
        <div class="book-card">
            <h3>Book Title 2</h3>
            <p>Author Name</p>
            <a href="#" class="btn">Read Now</a>
        </div>

        <!-- Book 3 -->
        <div class="book-card">
            <h3>Book Title 3</h3>
            <p>Author Name</p>
            <a href="#" class="btn">Read Now</a>
        </div>
              <!-- Book 4 -->
<div class="book-card">
    <h3>Teachers Training Script</h3>
    <p>Author Name</p>
    <a href="Teachers Training Script.pdf" class="btn">Read Now</a>
</div>

</div>

</body>
</html>
