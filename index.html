<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Digital Library</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; padding: 20px; }
        h1 { text-align: center; color: #333; }
        
        /* Grid Layout */
        .library-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        /* Book Card Style */
        .book-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }

        .book-card img { width: 100%; height: 250px; object-fit: cover; border-radius: 5px; }
        .book-card h3 { font-size: 1.2rem; margin: 10px 0; }
        
        .btn {
            display: inline-block;
            background: #28a745;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>Meri Library</h1>

    <div class="library-container">
        <!-- Book 1 -->
        <div class="book-card">
            <h3>Book Title 1</h3>
            <p>Author Name</p>
            <a href="#" class="btn">Read Now</a>
        </div>

        <!-- Book 2 -->
        <div class="book-card">
            <h3>Book Title 2</h3>
            <p>Author Name</p>
            <a href="#" class="btn">Read Now</a>
        </div>

        <!-- Book 3 -->
        <div class="book-card">
            <h3>Book Title 3</h3>
            <p>Author Name</p>
            <a href="#" class="btn">Read Now</a>
        </div>
              <!-- Book 4 -->
<div class="book-card">
    <h3>Teachers Training Script</h3>
    <p>Author Name</p>
    <a href="Teachers Training Script.pdf" class="btn">Read Now</a>
</div>

</div>

</body>
</html>
